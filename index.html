<style>
body { font-family: Arial, sans-serif; background:#f5f6fa; margin:0; padding:0;}
header { text-align:center; padding:20px; background:#2f3640; color:#fff;}
header h1 { margin:0; font-size:2em;}
nav { text-align:center; margin:15px 0;}
nav button { margin:0 10px; padding:10px 20px; font-size:1em; border:none; border-radius:5px; cursor:pointer; background:#00a8ff; color:#fff; transition:0.3s; }
nav button:hover { background:#0097e6; }

#search { width:200px; padding:7px; border-radius:5px; border:1px solid #ccc; margin-bottom:15px;}

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px;}
.grid-item { text-align:center; background:#fff; padding:10px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s;}
.grid-item img { width:200px; height:350px; object-fit:cover; cursor:pointer; border-radius:5px; }
.grid-item:hover { transform: scale(1.05); box-shadow:0 6px 12px rgba(0,0,0,0.2);}
.grid-item p { margin-top:8px; font-weight:bold;}

.hidden { display:none;}
h2 { margin-top:40px; padding-left:20px; color:#2f3640;}
</style>
</head>
<body>

<header>
  <h1>Unified Drill Library</h1>
  <nav>
    <button onclick="filterSection('all')">All Drills</button>
    <button onclick="filterSection('favorites')">Favorites</button>
  </nav>
  <input type="text" id="search" placeholder="Search drills..." onkeyup="searchDrills()">
</header>

<div id="drill-container" class="grid">

<script>
// Search functionality
function searchDrills() {
  let input = document.getElementById('search').value.toLowerCase();
  let items = document.querySelectorAll('.grid-item');
  items.forEach(item => {
    let title = item.dataset.title.toLowerCase();
    item.style.display = title.includes(input) ? 'block' : 'none';
  });
}

// Favorites filtering
function filterSection(section) {
  let items = document.querySelectorAll('.grid-item');
  if (section === 'all') {
    items.forEach(item => item.style.display='block');
  } else if (section === 'favorites') {
    items.forEach(item => item.style.display = (item.dataset.favorite === 'true') ? 'block' : 'none');
  }
}
</script>
