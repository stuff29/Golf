<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Golf Drill Library</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f6fa;
    color: #2f3640;
    margin: 0;
    padding: 0;
  }

  header {
    background: #192a56;
    color: #f5f6fa;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  header h1 {
    margin: 0;
    font-size: 1.6rem;
  }

  .nav-buttons {
    display: flex;
    gap: 10px;
  }

  .nav-buttons a {
    background: #40739e;
    color: #f5f6fa;
    padding: 8px 14px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.2s;
  }

  .nav-buttons a:hover {
    background: #487eb0;
  }

  main {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .controls input[type="text"] {
    padding: 8px;
    width: 250px;
    border-radius: 5px;
    border: 1px solid #dcdde1;
  }

  .controls button {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    background: #44bd32;
    color: #f5f6fa;
    font-weight: bold;
    cursor: pointer;
  }

  .controls button.active {
    background: #273c75;
  }

  h2 {
    margin-top: 40px;
    color: #192a56;
    border-bottom: 2px solid #40739e;
    padding-bottom: 5px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .grid-item {
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    text-align: center;
    padding: 10px;
    transition: transform 0.2s;
  }

  .grid-item:hover {
    transform: translateY(-5px);
    box-shadow: 0px 8px 18px rgba(0,0,0,0.15);
  }

  .grid-item img {
    width: 200px;
    height: 350px;
    object-fit: cover;
    border-radius: 5px;
    cursor: pointer;
  }

  .grid-item p {
    margin-top: 10px;
    font-weight: bold;
  }
</style>
</head>

</header>
