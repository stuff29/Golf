<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Drill Library</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f2f4f7;
    color: #333;
    margin: 0;
    padding: 0;
  }

  header {
    background-color: #0d47a1;
    color: white;
    padding: 20px;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 2em;
  }

  .nav-buttons {
    margin: 10px 0;
    text-align: center;
  }

  .nav-buttons a {
    text-decoration: none;
    background-color: #1976d2;
    color: white;
    padding: 10px 20px;
    margin: 0 5px;
    border-radius: 5px;
    transition: background 0.3s;
  }

  .nav-buttons a:hover {
    background-color: #0d47a1;
  }

  .controls {
    display: flex;
    justify-content: center;
    margin: 20px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .controls input, .controls button {
    padding: 8px 12px;
    font-size: 1em;
  }

  .section {
    margin: 40px 20px;
  }

  .section h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.8em;
    color: #0d47a1;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    justify-items: center;
  }

  .card {
    background-color: white;
    border-radius: 10px;
    padding: 10px;
    width: 200px;
    text-align: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .card img {
    width: 200px;
    height: 350px;
    object-fit: cover;
    border-radius: 5px;
  }

  .label {
    margin-top: 10px;
    font-weight: bold;
  }

  footer {
    text-align: center;
    padding: 15px;
    background-color: #0d47a1;
    color: white;
    margin-top: 40px;
  }

</style>
</head>
<body>

<header>
  <h1>Unified Drill Library</h1>
  <div class="nav-buttons">
    <a href="#drills">Drills</a>
    <a href="#office">Office</a>
    <a href="#stretching">Stretching</a>
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search drills...">
  <button id="favoritesBtn">Show Favorites</button>
</div>

<!-- DRILLS SECTION -->
<div class="section" id="drills">
  <h2>Drills</h2>
  <div class="grid" id="grid-drills"></div>
</div>

<!-- OFFICE SECTION -->
<div class="section" id="office">
  <h2>Office Drills</h2>
  <div class="grid" id="grid-office"></div>
</div>

<!-- STRETCHING SECTION -->
<div class="section" id="stretching">
  <h2>Stretching</h2>
  <div class="grid" id="grid-stretching"></div>
</div>

<footer>
  Unified Drill Library &copy; 2026
</footer>

<script>
const drills = [
  {img: 'images/GripDrill.png', label: 'Grip Test', url: 'https://youtube.com/shorts/FXCRiwjWSws?si=FdcLm6vqSz6EkAtk'},
  {img: 'images/GripAnalysis.png', label: 'Grip Analysis', url: 'https://www.facebook.com/share/r/15t9f6Hbrt/'},
  {img: 'images/HeadStill.png', label: 'Keep Head Still Drill', url: 'https://www.facebook.com/share/r/1H16ixiqbd/'},
  {img: 'images/WeightShift.png', label: 'Weight Shift', url: 'https://www.facebook.com/share/r/1BWfWbr27A/'},
  {img: 'images/ImpactLine.png', label: 'Impact Line', url: 'https://www.facebook.com/share/r/19rd2YxiLU/'},
  {img: 'images/DoorframeDriver.png', label: 'Doorframe Driver', url: 'https://www.facebook.com/share/r/1CfVicRhRt/'},
  {img: 'images/StepIntoIt.png', label: 'Step Into It', url: 'https://www.facebook.com/share/r/18UrLqCUyJ/'},
  {img: 'images/SwingStepDrill.png', label: 'Swing Step Drill', url: 'https://www.facebook.com/share/v/1KoLfqLa2s/'},
  {img: 'images/CompressionStepDrill.png', label: 'Compression Step Drill', url: 'https://www.facebook.com/share/r/1BN5YzNKsZ/'},
  {img: 'images/SlowDown.png', label: 'Slow Down Swing Drill', url: 'https://youtube.com/shorts/o72qLYgj8ug?si=QKy27epA_yOPhzG5'},
  {img: 'images/SquashBug.png', label: 'Squash The Bug', url: 'https://www.facebook.com/reel/1878055812806888'},
  {img: 'images/EarlyExtension.png', label: 'Early Extension', url: 'https://www.facebook.com/share/v/1ACeAhSnUg/'},
  {img: 'images/IronDrill.png', label: 'Iron Drill', url: 'https://www.instagram.com/reel/DHjqiGmThjw/?igsh=aDFhNjFmYTZsYnJ5'},
  {img: 'images/Hands.png', label: 'Hands', url: 'https://youtube.com/shorts/pBSMU1Og2Hc?si=a_nDBvVAS8DUABZm'},
  {img: 'images/ShallowClubStick.png', label: 'Shallow Club (Stick)', url: 'https://www.facebook.com/share/r/16E2uBwfRm/'},
  {img: 'images/OverTheTopStick.png', label: 'Over The Top (Stick)', url: 'https://www.facebook.com/share/r/1XWTD8CxPK/'},
  {img: 'images/3DrillsStick.png', label: '3 Drills (Stick)', url: 'https://www.facebook.com/share/r/1AcLW4fm6i/'},
  {img: 'images/StrikeDrillSticks.png', label: 'Strike Drill (Sticks)', url: 'https://www.facebook.com/share/r/1AGcZTJAhv/'},
  {img: 'images/WedgeDrillSticks.png', label: 'Wedge Drill (Sticks)', url: 'https://www.facebook.com/share/r/12LNrHuHebu/'},
  {img: 'images/OneHandSwing.png', label: 'One Hand Swing', url: 'https://youtube.com/shorts/ircfhXoBUrg?si=xnUvIsCEmtkjpBgw'},
  {img: 'images/GeneratePower.png', label: 'Generate Power Drill', url: 'https://youtube.com/shorts/lKmhCgld1W0?si=7XBrFgej2j5hf-dn'}
];

const office = [
  {img: 'images/LeftKnee.png', label: 'Left Knee', url: 'https://youtube.com/shorts/q17LA-BlIrE?si=HQjBnOSWq2mwPGi2'},
  {img: 'images/RotationOffice.png', label: 'Rotation Drill', url: 'https://youtube.com/shorts/9BjYi4fHB9Y?si=ML5Cv_R3W1t_sNr4'},
  {img: 'images/SwayFix.png', label: 'Sway Fix', url: 'https://www.facebook.com/share/r/1LjfWo8PER/'},
  {img: 'images/ShallowingExercises.png', label: 'Shallowing', url: 'https://www.facebook.com/share/r/1CeA2a6T5y/'},
  {img: 'images/BackswingOffice.png', label: 'Backswing', url: 'https://www.facebook.com/share/r/17Fpxu57XX/'},
  {img: 'images/BackswingPosture.png', label: 'Backswing', url: 'https://www.facebook.com/share/r/179sBZc4U2/'},
  {img: 'images/BackswingWall.png', label: 'Backswing', url: 'https://www.facebook.com/share/r/14DzAbzTQQQ/'},
  {img: 'images/HipMovement.png', label: 'Hip Movement', url: 'https://www.facebook.com/share/r/1DpA9WH1EK/'},
  {img: 'images/PivotDrill.png', label: 'Pivot Drill', url: 'https://www.facebook.com/share/r/1Bs7Hz8B9S/'},
  {img: 'images/HeadOnWall.png', label: 'Head On Wall', url: 'https://www.facebook.com/share/r/19nQ8q3FtQ/'}
];

const stretching = [
  {img: 'images/ShoulderInjury.png', label: 'Shoulder Injury', url: 'https://www.facebook.com/share/r/1BifyXN4MN/'},
  {img: 'images/HipStretching.png', label: 'Hips', url: 'https://www.facebook.com/share/r/17oRo2jBv8/'},
  {img: 'images/GolfStretching3.png', label: 'Golf Stretching 3 Stretches', url: 'https://www.facebook.com/share/r/18WVcACbnN/'},
  {img: 'images/GolfStretching10.png', label: 'Golf Stretching 10 Minutes', url: 'https://www.facebook.com/reel/3847933995513489'},
  {img: 'images/BackStretching.png', label: 'Back Stretching', url: 'https://www.facebook.com/share/r/1BMLcSx3di/'},
  {img: 'images/ShoulderStretching.png', label: 'Shoulders Stretching', url: 'https://www.facebook.com/share/r/15MLkySBsb/'}
];

// Render function
function drawDrills(containerId, array) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  array.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<a href="${d.url}" target="_blank"><img src="${d.img}" alt="${d.label}"></a><div class="label">${d.label}</div>`;
    container.appendChild(card);
  });
}

// Initial render
drawDrills('grid-drills', drills);
drawDrills('grid-office', office);
drawDrills('grid-stretching', stretching);

// Search and favorites
const searchInput = document.getElementById('search');
const favoritesBtn = document.getElementById('favoritesBtn');
let favoritesOnly = false;

searchInput.addEventListener('input', () => {
  const term = searchInput.value.toLowerCase();
  drawDrills('grid-drills', drills.filter(d => d.label.toLowerCase().includes(term)));
  drawDrills('grid-office', office.filter(d => d.label.toLowerCase().includes(term)));
  drawDrills('grid-stretching', stretching.filter(d => d.label.toLowerCase().includes(term)));
});

favoritesBtn.addEventListener('click', () => {
  favoritesOnly = !favoritesOnly;
  favoritesBtn.textContent = favoritesOnly ? 'Showing Favorites Only' : 'Show Favorites';
  const filter = d => !favoritesOnly || d.label.toLowerCase().includes('power') || d.label.toLowerCase().includes('slow');
  drawDrills('grid-drills', drills.filter(filter));
  drawDrills('grid-office', office.filter(filter));
  drawDrills('grid-stretching', stretching.filter(filter));
});
</script>

</body>
</html>
