.container{

.navbtn{

padding:10px 18px;

font-weight:600;
cursor:pointer;
}

.favbtn:hover{
background:#374151;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:24px;
}

.card{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 6px 14px rgba(0,0,0,.12);
transition:.25s;
text-align:center;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 24px rgba(0,0,0,.18);
}

.card img{
width:200px;
height:350px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.label{
margin-top:8px;
font-weight:600;
font-size:14px;
}

.star{
position:absolute;
top:10px;
right:12px;
font-size:22px;
cursor:pointer;
color:#d1d5db;
transition:.2s;
}

.star.active{
color:#fbbf24;
}

.star:hover{
transform:scale(1.2);
}

/* TRACKMAN SECTION */
.trackman-section {
  max-width: 900px; /* wide column */

  padding: 10px;
}

.tm-card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 6px 14px rgba(0,0,0,.12);
}

/* Title & subtitle */
.tm-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 5px;
}

.tm-sub {
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 15px;
}

/* Table wrapper: makes table and card look like one block */
.tm-table-wrapper {
  overflow-x: auto;
  margin: 0 -20px; /* negate card padding to extend table background */
  padding: 0 20px; /* maintain spacing inside wrapper */
}

/* Table styling */
.tm-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  background: white; /* seamless white background */
  min-width: 700px; /* ensures table is wide enough */
  border-radius: 8px;
}

/* Header */
.tm-table th {
  background-color: #f3f4f6;
  font-weight: 600;
  border-bottom: 2px solid #e5e7eb;
  padding: 8px 12px;
  text-align: center;
}

/* Body */
.tm-table td {
  border-bottom: 1px solid #e5e7eb;
  text-align: center;
  padding: 8px 12px;
  white-space: nowrap;
}

/* Alternating rows */
.tm-table tbody tr:nth-child(even) {
  background-color: #f9fafb;
}

/* Hover effect */
.tm-table tbody tr:hover {
  background-color: #e5e7eb;
  transition: background 0.2s;
}
</style>
</head>

let favorites=JSON.parse(localStorage.getItem("favDrills")||"[]");
let currentCategory="drills";

const grid=document.getElementById("grid");

function draw(list){

grid.innerHTML="";

list.forEach(d=>{

const card=document.createElement("div");
card.className="card";

const star=document.createElement("div");
star.className="star";
star.innerHTML="★";

if(favorites.includes(d.img)) star.classList.add("active");

star.onclick=()=>toggleFav(d.img,star);

card.innerHTML+=`
<a href="${d.url}" target="_blank">
<img src="images/${d.img}.png">
</a>
<div class="label">${d.label}</div>
`;

card.appendChild(star);
grid.appendChild(card);

});

}

function toggleFav(name,star){

if(favorites.includes(name)){

favorites=favorites.filter(f=>f!==name);
star.classList.remove("active");

}else{

favorites.push(name);
star.classList.add("active");

}

localStorage.setItem("favDrills",JSON.stringify(favorites));

}

function filterCategory(cat){

currentCategory=cat;

const filtered=drills.filter(d=>d.category===cat);

draw(filtered);

}

document.getElementById("search").addEventListener("input",function(){

const term=this.value.toLowerCase();

const filtered=drills.filter(d=>
d.category===currentCategory &&
d.label.toLowerCase().includes(term)
);

draw(filtered);

});

function showFavorites(){

const fav=drills.filter(d=>favorites.includes(d.img));

draw(fav);

}
