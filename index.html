<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Golf Drill Library</title>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(180deg,#f7f9fc,#eef2f7);
margin:0;
color:#1f2933;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px 50px;
}

h1{
text-align:center;
margin-bottom:10px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:30px;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:30px;
}

.search{
padding:10px 14px;
font-size:15px;
border-radius:6px;
border:1px solid #d1d5db;
width:260px;
}

.favbtn{
background:#111827;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.favbtn:hover{
background:#374151;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:24px;
}

.card{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 6px 14px rgba(0,0,0,.12);
transition:.25s;
text-align:center;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 24px rgba(0,0,0,.18);
}

.card img{
width:200px;
height:350px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.label{
margin-top:8px;
font-weight:600;
font-size:14px;
}

.star{
position:absolute;
top:10px;
right:12px;
font-size:22px;
cursor:pointer;
color:#d1d5db;
}

.star.active{
color:#fbbf24;
}

</style>
</head>

<body>

<div class="container">

<h1>Golf Drill Library</h1>
<div class="subtitle">All Drills</div>

<div class="controls">
<input id="search" class="search" placeholder="Search drills...">
<button class="favbtn" onclick="showFavorites()">Favorites</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>

const drills=[

/* MAIN DRILLS */

{img:"GripDrill",label:"Grip Test",url:"https://youtube.com/shorts/FXCRiwjWSws"},
{img:"GripAnalysis",label:"Grip Analysis",url:"https://www.facebook.com/share/r/15t9f6Hbrt/"},
{img:"HeadStill",label:"Keep Head Still Drill",url:"https://www.facebook.com/share/r/1H16ixiqbd/"},
{img:"WeightShift",label:"Weight Shift",url:"https://www.facebook.com/share/r/1BWfWbr27A/"},
{img:"ImpactLine",label:"Impact Line",url:"https://www.facebook.com/share/r/19rd2YxiLU/"},
{img:"DoorframeDriver",label:"Doorframe Driver",url:"https://www.facebook.com/share/r/1CfVicRhRt/"},
{img:"StepIntoIt",label:"Step Into It",url:"https://www.facebook.com/share/r/18UrLqCUyJ/"},
{img:"SwingStepDrill",label:"Swing Step Drill",url:"https://www.facebook.com/share/v/1KoLfqLa2s/"},
{img:"CompressionStepDrill",label:"Compression Step Drill",url:"https://www.facebook.com/share/r/1BN5YzNKsZ/"},
{img:"SlowDown",label:"Slow Down Swing Drill",url:"https://youtube.com/shorts/o72qLYgj8ug"},
{img:"SquashBug",label:"Squash The Bug",url:"https://www.facebook.com/reel/1878055812806888"},
{img:"EarlyExtension",label:"Early Extension",url:"https://www.facebook.com/share/v/1ACeAhSnUg/"},
{img:"IronDrill",label:"Iron Drill",url:"https://www.instagram.com/reel/DHjqiGmThjw/?igsh=aDFhNjFmYTZsYnJ5"},
{img:"Hands",label:"Hands",url:"https://youtube.com/shorts/pBSMU1Og2Hc"},
{img:"ShallowClubStick",label:"Shallow Club (Stick)",url:"https://www.facebook.com/share/r/16E2uBwfRm/"},
{img:"OverTheTopStick",label:"Over The Top (Stick)",url:"https://www.facebook.com/share/r/1XWTD8CxPK/"},
{img:"3DrillsStick",label:"3 Drills (Stick)",url:"https://www.facebook.com/share/r/1AcLW4fm6i/"},
{img:"StrikeDrillSticks",label:"Strike Drill (Sticks)",url:"https://www.facebook.com/share/r/1AGcZTJAhv/"},
{img:"WedgeDrillSticks",label:"Wedge Drill (Sticks)",url:"https://www.facebook.com/share/r/12LNrHuHebu/"},

/* OFFICE DRILLS */

{img:"LeftKnee",label:"Left Knee",url:"https://youtube.com/shorts/q17LA-BlIrE"},
{img:"RotationOffice",label:"Rotation Drill",url:"https://youtube.com/shorts/9BjYi4fHB9Y"},
{img:"SwayFix",label:"Sway Fix",url:"https://www.facebook.com/share/r/1LjfWo8PER/"},
{img:"ShallowingExercises",label:"Shallowing",url:"https://www.facebook.com/share/r/1CeA2a6T5y/"},
{img:"BackswingOffice",label:"Backswing",url:"https://www.facebook.com/share/r/17Fpxu57XX/"},
{img:"BackswingPosture",label:"Backswing Posture",url:"https://www.facebook.com/share/r/179sBZc4U2/"},
{img:"BackswingWall",label:"Backswing Wall",url:"https://www.facebook.com/share/r/14DzAbzTQQQ/"},

/* STRETCHING */

{img:"ShoulderInjury",label:"Shoulder Injury",url:"https://www.facebook.com/share/r/1BifyXN4MN/"},
{img:"HipStretching",label:"Hip Stretching",url:"https://www.facebook.com/share/r/17oRo2jBv8/"},
{img:"GolfStretching3",label:"Golf Stretching 3 Stretches",url:"https://www.facebook.com/share/r/18WVcACbnN/"},
{img:"GolfStretching10",label:"Golf Stretching 10 Minutes",url:"https://www.facebook.com/reel/3847933995513489"},
{img:"BackStretching",label:"Back Stretching",url:"https://www.facebook.com/share/r/1BMLcSx3di/"},
{img:"ShoulderStretching",label:"Shoulder Stretching",url:"https://www.facebook.com/share/r/15MLkySBsb/"}

];

let favorites=JSON.parse(localStorage.getItem("favDrills")||"[]");

const grid=document.getElementById("grid");

function draw(list){

grid.innerHTML="";

list.forEach(d=>{

const card=document.createElement("div");
card.className="card";

const star=document.createElement("div");
star.className="star";
star.innerHTML="★";

if(favorites.includes(d.img)) star.classList.add("active");

star.onclick=()=>toggleFav(d.img,star);

card.innerHTML+=`<a href="${d.url}" target="_blank"><img src="images/${d.img}.png"></a>
<div class="label">${d.label}</div>`;

card.appendChild(star);

grid.appendChild(card);

});

}

function toggleFav(name,star){

if(favorites.includes(name)){
favorites=favorites.filter(f=>f!==name);
star.classList.remove("active");
}else{
favorites.push(name);
star.classList.add("active");
}

localStorage.setItem("favDrills",JSON.stringify(favorites));

}

document.getElementById("search").addEventListener("input",function(){

const term=this.value.toLowerCase();

const filtered=drills.filter(d=>d.label.toLowerCase().includes(term));

draw(filtered);

});

function showFavorites(){

const fav=drills.filter(d=>favorites.includes(d.img));

draw(fav);

}

draw(drills);

</script>

</body>
</html>
