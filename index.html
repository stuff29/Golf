<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Golf Page</title>

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(180deg,#f7f9fc,#eef2f7);
margin:0;
color:#1f2933;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px 50px;
}

h1{
text-align:center;
margin-bottom:10px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:30px;
}

.navbar{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:25px;
flex-wrap:wrap;
}

.navbtn{
background:#2c7be5;
color:white;
padding:10px 18px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:600;
font-size:14px;
box-shadow:0 2px 6px rgba(0,0,0,.15);
transition:.2s;
}

.navbtn:hover{
background:#1a5fc2;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:30px;
}

.search{
padding:10px 14px;
font-size:15px;
border-radius:6px;
border:1px solid #d1d5db;
width:260px;
}

.favbtn{
background:#111827;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.favbtn:hover{
background:#374151;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:24px;
}

.card{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 6px 14px rgba(0,0,0,.12);
transition:.25s;
text-align:center;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 24px rgba(0,0,0,.18);
}

.card img{
width:200px;
height:350px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.label{
margin-top:8px;
font-weight:600;
font-size:14px;
}

.star{
position:absolute;
top:10px;
right:12px;
font-size:22px;
cursor:pointer;
color:#d1d5db;
transition:.2s;
}

.star.active{
color:#fbbf24;
}

.star:hover{
transform:scale(1.2);
}

/* TRACKMAN */
/* Center TrackMan content */
.trackman-section {
    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column; /* stack Notes above table */
    align-items: center; /* center horizontally */
}

/* Make cards full width but table inside smaller and centered */
.tm-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 6px 14px rgba(0,0,0,.12);
    width: 100%;
    max-width: 800px; /* optional: make cards narrower than section */
    box-sizing: border-box;
}

.tm-table {
    width: 100%;
    max-width: 750px; /* restrict table width */
    margin: 0 auto; /* center horizontally */
    border-collapse: collapse;
    font-size: 14px;
}

</style>
</head>

let favorites=JSON.parse(localStorage.getItem("favDrills")||"[]");
let currentCategory="drills";

const grid=document.getElementById("grid");

function draw(list){

grid.innerHTML="";

list.forEach(d=>{

const card=document.createElement("div");
card.className="card";

const star=document.createElement("div");
star.className="star";
star.innerHTML="★";

if(favorites.includes(d.img)) star.classList.add("active");

star.onclick=()=>toggleFav(d.img,star);

card.innerHTML+=`
<a href="${d.url}" target="_blank">
<img src="images/${d.img}.png">
</a>
<div class="label">${d.label}</div>
`;

card.appendChild(star);
grid.appendChild(card);

});

}

function toggleFav(name,star){

if(favorites.includes(name)){

favorites=favorites.filter(f=>f!==name);
star.classList.remove("active");

}else{

favorites.push(name);
star.classList.add("active");

}

localStorage.setItem("favDrills",JSON.stringify(favorites));

}

function filterCategory(cat){
    currentCategory = cat;

    // make sure grid layout is restored
    grid.classList.add("grid");

    const filtered = drills.filter(d => d.category === cat);
    draw(filtered);
}

document.getElementById("search").addEventListener("input",function(){

const term=this.value.toLowerCase();

const filtered=drills.filter(d=>
d.category===currentCategory &&
d.label.toLowerCase().includes(term)
);

draw(filtered);

});

function showFavorites(){

const fav=drills.filter(d=>favorites.includes(d.img));

draw(fav);

}
