<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Drill Library</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        margin: 0;
        padding: 0;
    }
    header {
        background-color: #004080;
        color: white;
        padding: 20px;
        text-align: center;
    }
    header h1 {
        margin: 0;
        font-size: 2em;
    }
    .nav-buttons {
        margin-top: 10px;
    }
    .nav-buttons a {
        display: inline-block;
        margin: 5px 10px;
        padding: 10px 15px;
        background-color: #0066cc;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: background 0.3s;
    }
    .nav-buttons a:hover {
        background-color: #004080;
    }
    .controls {
        display: flex;
        justify-content: center;
        margin: 20px 0;
        gap: 20px;
        flex-wrap: wrap;
    }
    .controls input {
        padding: 10px;
        font-size: 1em;
        width: 250px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .controls button {
        padding: 10px 15px;
        font-size: 1em;
        border-radius: 5px;
        border: none;
        background-color: #0066cc;
        color: white;
        cursor: pointer;
        transition: background 0.3s;
    }
    .controls button:hover {
        background-color: #004080;
    }
    .section {
        margin: 30px;
    }
    .section h2 {
        text-align: center;
        font-size: 1.8em;
        color: #004080;
        margin-bottom: 20px;
    }
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        justify-items: center;
    }
    .grid-item {
        text-align: center;
        transition: transform 0.3s;
    }
    .grid-item:hover {
        transform: scale(1.05);
    }
    .grid-item img {
        width: 200px;
        height: 350px;
        object-fit: cover;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: box-shadow 0.3s;
    }
    .grid-item img:hover {
        box-shadow: 0 8px 16px rgba(0,0,0,0.4);
    }
    .grid-item p {
        margin-top: 8px;
        font-weight: bold;
        font-size: 1em;
        color: #333;
    }
</style>
</head>
<body>
<header>
    <h1>Unified Drill Library</h1>
    <div class="nav-buttons">
        <a href="#Index">Index Drills</a>
        <a href="#Office">Office Drills</a>
        <a href="#Stretching">Stretching Drills</a>
    </div>
</header>

<div class="controls">
    <input type="text" id="searchInput" placeholder="Search drills...">
    <button id="favoritesBtn">Show Favorites</button>
</div>

<!-- Index Drills Section -->
<div class="section" id="Index">
    <h2>Index Drills</h2>
    <div class="grid-container" id="indexGrid">
        <!-- Replace the following grid-item entries with all your Index drills -->
        <div class="grid-item" data-title="Grip Test" data-favorite="true">
            <a href="https://youtube.com/shorts/FXCRiwjWSws?si=FdcLm6vqSz6EkAtk" target="_blank">
                <img src="images/GripDrill.png" alt="Grip Test">
            </a>
            <p>Grip Test</p>
        </div>
        <div class="grid-item" data-title="Grip Analysis" data-favorite="true">
            <a href="https://www.facebook.com/share/r/15t9f6Hbrt/" target="_blank">
                <img src="images/GripAnalysis.png" alt="Grip Analysis">
            </a>
            <p>Grip Analysis</p>
        </div>
        <div class="grid-item" data-title="Keep Head Still Drill" data-favorite="false">
            <a href="https://www.facebook.com/share/r/1H16ixiqbd/" target="_blank">
                <img src="images/HeadStill.png" alt="Keep Head Still Drill">
            </a>
            <p>Keep Head Still Drill</p>
        </div>
        <div class="grid-item" data-title="Weight Shift" data-favorite="false">
            <a href="https://www.facebook.com/share/r/1BWfWbr27A/" target="_blank">
                <img src="images/WeightShift.png" alt="Weight Shift">
            </a>
            <p>Weight Shift</p>
        </div>
        <!-- Continue adding all remaining Index drills in the same pattern -->
    </div>
</div>

<!-- Office Drills Section -->
<div class="section" id="Office">
    <h2>Office Drills</h2>
    <div class="grid-container" id="officeGrid">
        <!-- Replace the following grid-item entries with all your Office drills -->
        <div class="grid-item" data-title="Left Knee" data-favorite="false">
            <a href="https://youtube.com/shorts/q17LA-BlIrE?si=HQjBnOSWq2mwPGi2" target="_blank">
                <img src="images/LeftKnee.png" alt="Left Knee">
            </a>
            <p>Left Knee</p>
        </div>
        <div class="grid-item" data-title="Rotation Drill" data-favorite="false">
            <a href="https://youtube.com/shorts/9BjYi4fHB9Y?si=ML5Cv_R3W1t_sNr4" target="_blank">
                <img src="images/RotationOffice.png" alt="Rotation Drill">
            </a>
            <p>Rotation Drill</p>
        </div>
        <div class="grid-item" data-title="Sway Fix" data-favorite="false">
            <a href="https://www.facebook.com/share/r/1LjfWo8PER/" target="_blank">
                <img src="images/SwayFix.png" alt="Sway Fix">
            </a>
            <p>Sway Fix</p>
        </div>
        <!-- Continue adding all remaining Office drills in the same pattern -->
    </div>
</div>

<!-- Stretching Drills Section -->
<div class="section" id="Stretching">
    <h2>Stretching Drills</h2>
    <div class="grid-container" id="stretchingGrid">
        <!-- Replace the following grid-item entries with all your Stretching drills -->
        <div class="grid-item" data-title="Shoulder Injury" data-favorite="false">
            <a href="https://www.facebook.com/share/r/1BifyXN4MN/" target="_blank">
                <img src="images/ShoulderInjury.png" alt="Shoulder Injury">
            </a>
            <p>Shoulder Injury</p>
        </div>
        <div class="grid-item" data-title="Hips" data-favorite="false">
            <a href="https://www.facebook.com/share/r/17oRo2jBv8/" target="_blank">
                <img src="images/HipStretching.png" alt="Hips">
            </a>
            <p>Hips</p>
        </div>
        <div class="grid-item" data-title="Golf Stretching 3 Stretches" data-favorite="false">
            <a href="https://www.facebook.com/share/r/18WVcACbnN/" target="_blank">
                <img src="images/GolfStretching3.png" alt="Golf Stretching 3 Stretches">
            </a>
            <p>Golf Stretching 3 Stretches</p>
        </div>
        <!-- Continue adding all remaining Stretching drills in the same pattern -->
    </div>
</div>

<script>
const searchInput = document.getElementById('searchInput');
const favoritesBtn = document.getElementById('favoritesBtn');
let favoritesOnly = false;

searchInput.addEventListener('input', () => {
    const query = searchInput.value.toLowerCase();
    document.querySelectorAll('.grid-item').forEach(item => {
        const title = item.dataset.title.toLowerCase();
        const isFavorite = item.dataset.favorite === "true";
        item.style.display = (title.includes(query) && (!favoritesOnly || isFavorite)) ? 'block' : 'none';
    });
});

favoritesBtn.addEventListener('click', () => {
    favoritesOnly = !favoritesOnly;
    favoritesBtn.textContent = favoritesOnly ? "Show All" : "Show Favorites";
    searchInput.dispatchEvent(new Event('input'));
});
</script>

</body>
</html>
