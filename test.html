<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Golf Page</title>

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(180deg,#f7f9fc,#eef2f7);
margin:0;
color:#1f2933;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px 50px;
}

h1{
text-align:center;
margin-bottom:10px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:30px;
}

.navbar{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:25px;
flex-wrap:wrap;
}

.navbtn{
background:#2c7be5;
color:white;
padding:10px 18px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:600;
font-size:14px;
box-shadow:0 2px 6px rgba(0,0,0,.15);
transition:.2s;
}

.navbtn:hover{
background:#1a5fc2;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:30px;
}

.search{
padding:10px 14px;
font-size:15px;
border-radius:6px;
border:1px solid #d1d5db;
width:260px;
}

.favbtn{
background:#111827;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.favbtn:hover{
background:#374151;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:24px;
}

.card{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 6px 14px rgba(0,0,0,.12);
transition:.25s;
text-align:center;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 24px rgba(0,0,0,.18);
}

.card img{
width:200px;
height:350px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.label{
margin-top:8px;
font-weight:600;
font-size:14px;
}

.star{
position:absolute;
top:10px;
right:12px;
font-size:50px;
cursor:pointer;
color:#F88379;
transition:.2s;
}

.star.active{
color:#fbbf24;
}

.star:hover{
transform:scale(1.2);
}

.img-wrap{
  position:relative;
}

/* Blue dot */
.note-dot{
  position:absolute;
  top:8px;
  left:8px;
  width:25px;
  height:25px;
  border-radius:50%;
  background:#7DF9FF;
  cursor:pointer;
}

/* Note icon */
.note-icon{
  position:absolute;
  top:6px;
  right:8px;
  font-size:14px;
  background:rgba(0,0,0,.6);
  color:white;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
  opacity:0;
  transition:.2s;
}

.img-wrap:hover .note-icon{
  opacity:1;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

#modalText{
  margin:10px 0;
}

.page-text{
  max-width: 800px;
  margin: 30px auto 0;
  text-align: center;
  color: #374151;
  font-size: 14px;
  line-height: 1.6;
}  

.page-text{
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 6px 14px rgba(0,0,0,.12);
}  

#pageText:empty {
  display: none;
}  

/* TRACKMAN */
/* Center TrackMan content */
.trackman-section {
    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column; /* stack Notes above table */
    align-items: center; /* center horizontally */
}

/* Make cards full width but table inside smaller and centered */
.tm-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 6px 14px rgba(0,0,0,.12);
    width: 100%;
    max-width: 800px; /* optional: make cards narrower than section */
    box-sizing: border-box;
}

.tm-table {
    width: 100%;
    max-width: 750px; /* restrict table width */
    margin: 0 auto; /* center horizontally */
    border-collapse: collapse;
    font-size: 14px;
}

</style>
</head>

let favorites=JSON.parse(localStorage.getItem("favDrills")||"[]");
let currentCategory="drills";

const grid=document.getElementById("grid");

function draw(list){

grid.innerHTML="";

list.forEach(d=>{

const card=document.createElement("div");
card.className="card";

const star=document.createElement("div");
star.className="star";
star.innerHTML="★";

if(favorites.includes(d.img)) star.classList.add("active");

star.onclick=()=>toggleFav(d.img,star);

card.innerHTML+=`
  <div class="img-wrap">
    <a href="${d.url}" target="_blank">
      <img src="images/${d.img}.png">
    </a>

    ${d.note ? `<div class="note-dot"></div>` : ""}
    ${d.note ? `<div class="note-icon">📝</div>` : ""}
  </div>

  <div class="label">${d.label}</div>
`;  

if(d.note){
  card.querySelector(".note-icon").onclick = () => openModal(d);
  card.querySelector(".note-dot").onclick = () => openModal(d);
}

card.appendChild(star);
grid.appendChild(card);

});

}

function toggleFav(name,star){

if(favorites.includes(name)){

favorites=favorites.filter(f=>f!==name);
star.classList.remove("active");

}else{

favorites.push(name);
star.classList.add("active");

}

localStorage.setItem("favDrills",JSON.stringify(favorites));

}

function filterCategory(cat){
    currentCategory = cat;

    // make sure grid layout is restored
    grid.classList.add("grid");
  
    const filtered = drills.filter(d => d.category === cat);
    draw(filtered);

    setPageText(pageNotes[cat] || "");
}

function showCheatSheet(){
    const grid = document.getElementById("grid");

    // remove grid layout so it behaves like TrackMan
    grid.classList.remove("grid");

    grid.innerHTML = `
    <div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Bounce</u></b></div>
            <div class="placeholder">- As you open the face, you get more bounce</div>
            <div class="placeholder">- Less bounce is better for firmer conditions</div>
            <div class="placeholder">- More bounce is better for softer conditions</div>
            <div class="placeholder">- The more bounce you have the higher the blade is so if you are hitting off concrete, you'll blade more chips</div>
            <div class="placeholder">- If you have no bounce and hit into soft ground, the blade will dig into the ground before the ball - have to hit the ball first</div>
        </div>

    </div>

<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Wind</u></b></div>
            <div class="placeholder">- Drop grass and see where the wind blows it</div>
            <div class="placeholder">- Wind behind you, take 2 yards off shot for each yard paced off between you and where grass landed</div>
            <div class="placeholder">- Wind in face, 3 yards added to distance for each yard it blows away</div>
            <div class="placeholder">- Hitting from an elevated position increases wind by 50% because ball is in the air longer - 10 yard wind becomes 15 yards into wind or with wind</div>
        </div>

    </div>

    <div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Different Lies</u></b>
            <br><br>
            <u>Ball Above Your Feet</u><br>            
            - Choke down on the club<br>
            - Stand taller than normal<br>
            - Aim right of target (ball will want to draw)<br>
            <br>
            <u>Ball Below Your Feet</u><br>
- Grip up on the club (normal)<br>
- Bend knees more<br>
- Stay down through the shot<br>
- Aim left of target (ball will want to fade)<br>
<br>
<u>Downhill Shot</u><br>
- Ball back in stance<br>
- Shoulders parallel to slope<br>
- Take one less club than normal<br>
- Feel as though you are swinging down the slope<br>
<br>
<u>Uphill Shot</u><br>
- Ball forward in stance<br>
- Shoulders parallel to slope<br>
- Take one more club than normal<br>
- Don't fall back, stay in the shot as normal<br>
<br>
<u>Hard Ground Shot</u><br>
- Use a club with low bounce<br>
- Ball back in stance<br>
- Lean forward<br>
- Strike clean with no divot<br>
- For a high lob - toe down, open face, swing across the ball<br>
<br>
<u>Soggy Ground</u><br>
- Use a club with high bounce<br>
- Ball in center of stance<br>
- Shallow swing to "pick" it and not get stuck in the ground<br>

            
          </div>
        </div>
    </div>

<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Wedges & Spin</u></b>
            <br><br>
            <u>Analyze The Lie</u><br>            
            - Sitting up, more of the face will hit the ball so more spin - Sitting down, less contact since more grass between the face and ball so less spin <br>
            - Down grain the club will move faster so it will come out lower with more spin - Into the grain the club will catch and ball goes higher with less spin<br>
            <br>
            <u>Pick Landing Spot</u><br>
- Preferably on the green, preferably on the same level as the hole without slopes, preferable 10 feet onto the green<br>
- You want the same type of grass and grade which is why you don't want the fringe<br>
- When you have your 10 foot landing spot chosen, you are picking a shot so that hen the ball lands there, it will go in the hole<br>
- So how much height and spin do I need for the ball to land 10 feet from the hole and go in?<br>
<br>
<u>Visualize Trajectory & Spin Needed</u><br>
- This is where landing it 10 feet on the green is important as that dictates the type of height and spin required to get to hole<br>
- As you improve you could move the 10 feet landing spot as required<br>
            
          </div>
        </div>
    </div>    

<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Sand & Bunkers</u></b>
            <br><br>
<u>Good Lie Soft Sand</u><br>
- Ball in middle of stance<br>
- Club face open then grip club<br>
- Weight 60% in lead quad<br>
- Normal swing, hit sand just under ball like playing the bounce on grass, follow through with club open and finish left<br>
<br>
<u>Short Shot Good Lie Soft Sand</u><br>
- 60 degree<br>
- Open face<br>
- Choke down<br>
- Short swing<br>
<br>
<u>Long Shot Good Lie Soft Sand</u><br>
- Closed face<br>
- Grip up<br>
- Longer swing<br>
<br>
<u>Bad Lie In Soft Sand</u><br>
- 50/50 weight<br>
- 56 because it has bounce<br>
- Sit back like you are on a horse<br>
- Club will be going more around you and shallow<br>
- Bigger swing because the club is going to get caught in the sand<br>
<br>
<u>Hard Sand Good Lie</u><br>
- Feet closer together<br>
- 70% weight on left quad<br>
- Club face square but if you are good you can open it more as you improve<br>
- Shorter swing and less follow through as the club will dig in more (you aren't trying to punch it, sand is stopping it)<br>
<br>
<u>Plugged In Sand</u><br>
- Close face more so the toe is pointing in<br>
- Soft hands<br>
- Pressure is 70% on the left<br>
- Shot will be steep where the toe digs in and twists the face to flick it out<br>
- To spin it - Open face, heel of club in middle of ball, slam the heel info the sand behind the middle of the ball<br>
<br>
<u>Wet / Hard Sand</u><br>
- Close face slightly on a 56 or 60<br>
- Play it like a shot off the fairway on a hard lie<br>
- Hit sand half inch behind the ball<br>
- Can pick it clean if possible and don't need height<br>
<br>
<u>Really Soft Sand</u><br>
- Use a 52 degree<br>
- More weight on trail foot<br>
- Same swing as with a sand wedge<br>
<br>
<u>Uphill Bunker</u><br>
- 50 degree opened up a bit<br>
- Shoulders & hips parallel with slope<br>
- Don't lean either way, stay level by tilting upper body<br>
- Follow the slope with your shot (Get chin over ball)<br>
<br>
<u>Downhill Bunker</u><br>
- 60 degree<br>
- Lean with the slope, don't lean back<br>
- Swing down with the slope at the same angle<br>
- Don't lean back and try to lift it out<br>
<br>
<u>Notes For Bunker Play</u><br>
- best players are hitting the sane an inch and a half behind the ball<br>
- hitting the sand hard with the bounce of the club and following through<br>          
            
          </div>
        </div>
    </div> 
    

    <div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Chipping Around The Green</u></b>
            <br><br>
- On short chips, don't stop moving your chest & turn to target more<br>
- Where the club finishes tells you how much wrist break or release you should have with the wrists<br>
<br>
<u>Bump & Run</u><br>
- Don't choke down, ball mid to back heel, feet close together, very slight shaft lean<br>
- No wrist action, don't need to putt it but don't scoop it<br>
- 56 degree for short shots, 8 iron for longer (more loft more spin)<br>
- Want to bruise the grass with the leading edge and not use all of bounce<br>
- Butt of club pointing and left hip on follow through<br>
<br>
<u>Soft Landing - More Height & Spin</u><br>
- Want to use more of the bounce - middle of the sole<br>
- 56 is good<br>
- Ball needs a decent lie sitting up a bit to get under it<br>
- Ball forward inside left heel, flared left toe<br>
- Light grip pressure, don't choke down<br>
- Toe up in backswing, more wrists, chest turns with shot<br>
- Butt of club pointing at belt buckle on follow through<br>
<br>
<u>Lob Shot</u><br>
- Ball needs a decent lie sitting up a bit to get under it - 60 degree<br>
- Widen stance, ball more forward, no shaft lean, open face to use all of bounce<br>
- Longer & higher swing, toe up in backswing, lots of wrists, chest turns with shot<br>
- Butt of club pointing at right hip on follow through - with turn you can holster it in left hip<br>
<br>
<u>Putt Chip</u><br>
- Just need to clear fringe to get the ball started on the green<br>
- Toe down, handle up, putting stroke - little spin & trickles down<br>

            </div>
        </div>
    </div>    

    <div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Hitting Out Of Rough</u></b>
            <br><br>
- More leading edge on bottom of club is better for longer grass as it hits the ball first (5 wood better than a flat hybrid)<br>
<br>
<u>Deep Rough (Greens)</u><br>
- Wide stance with hands at very bottom of grip<br>
- Face slightly open<br>
- Backswing up quick, butt of club determines type of shot (flop or bump)<br>
<br>
<u>Deep Rough (Fairway)</u><br>
- Comes out slower with less spin so 5-10 yardss shorter<br>
- Grass behind ball so come in steep (weight more on left, left shoulder down, grip down an inch or two, ball back in stance)<br>
- If hay - open face a bit, lead with heel more, tighter grip<br>
<br>
<u>Types Of Lies</u><br>
- Grass blades pointing at you - slower<br>
- Grass blades pointing away from you - faster<br>
- Green and lush grass - slower<br>
- Brown and dry - faster<br>
- Thicker and deeper grass - slower<br>
- Thinner and shallow - faster<br>
- The deeper the slower<br>
<br>
<u>Hard Ground</u><br>
- Bump & Run - Toe down 8 iron slightly open - putt chip<br>
- Flop - 60 toe down - open face a bit - come across it<br>
- Fairway - Ball back, swinging down more<br>

            </div>
        </div>
    </div>
    

    <div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Template</u></b>
            <br><br>
<u>Title Of Section</u><br>
- Notes go here<br>
- Notes go here<br>


            </div>
        </div>
    </div>
    `;

 
setPageText("");

}

function showLessons(){
    const grid = document.getElementById("grid");

    // remove grid layout so it behaves like TrackMan
    grid.classList.remove("grid");

    grid.innerHTML = `


<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Chipping</u></b>
<br>
- Weight left more<br>
- Club head width apart - feet<br>
- Closer to the ball - heel raised a touch<br>
- Not too much shaft lean<br>
- Chest down after the ball is hit - chest over left foot is the thought pattern<br>
- Hitting more down on the ball rather than scooping<br>
- Putting stroke but don't be afraid to hit it<br>   

<br>
<u>Tommy Fleetwood Chip</u><br>
- Putting set up<br>
- Ball halfway between center and left heel<br>
- Set club on inner left thigh<br>
- Grip and putt swing with arms and shoulders and no wrist<br>
          </div>
        </div>
    </div>    


<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Hybrid</u></b>
<br>
- On club head inside like driver<br>
- Hands straight on with ball - neutral not forward<br>
- Flare left foot a bit<br>
- Hands and club head reach ball at the same time - Don't flip hands or lean shaft<br>
- Slow swing down a bit if need be<br>          
          </div>
        </div>
    </div> 


<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Iron Swing</u></b>
<br>
- Left shoulder on top of pec<br>
- Left elbow pointing down target line more<br>
- Right elbow underneath more and squeezed<br>
- Right tilt with hips more forward/bumped left<br>
- Keep head back behind ball<br>
- Weight should finish on back left heel at follow through<br>
- Club is open more<br>
<a href="https://www.youtube.com/watch?v=QWwfji_wfnU" target="_blank">The Lesson</a><br>
          </div>
        </div>
    </div>    
    


<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Back To Target Drill</u></b>
<br>
- Get to the top of the backswing<br>
- Keep back to target - Don't move it<br>
- Drop arms without moving your back<br>
- Get used to the feeling of arms starting first<br>
- Pulling arms down and then turning the body<br>
- Fastest hand speed comes in the pull down, not when you are about to hit the ball<br>     
          </div>
        </div>
    </div>    


<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Driving</u></b>
<br>
- Launch angle 11 - 14<br>
- Spin under 2,000<br>
- Line up a couple inches further back from inside ankle (one club head width)<br>
- Feet not spread too far apart<br>
- Hands lined up with ball - forward but not by much<br>
- Hands low, left arm straight, toe up, line dot with ball<br>
- Force right shoulder to tilt down a bit and swing natural - 60/40 on right foot helps with this<br>
- Right leg straightens more, not swaying, drops hip back more to make a bigger turn<br>
- Looking from behind the ball, right forearm should not be lined up above left arm<br>
- Long Hitting - left ankle comes up, all weight moves to right, grip is 6, long arching backswing<br>
- Think of swinging low to high on the proper arc<br>
<a href="https://www.facebook.com/share/r/162euNoEfe/" target="_blank">Video 1</a><br>
<a href="https://www.youtube.com/watch?v=Jp_gmyZWpjE" target="_blank">Video 2</a><br>
          </div>
        </div>
    </div>   
    

<div class="trackman-section">
        <div class="tm-card">
            <div class="tm-title"><b><u>Putting</u></b>
<br>
- Aim and consistent setup is most important<br>
- Grip pressure has to remain the same the entire time you putt<br>
- Set the putter down the same way every time - don't push down hard one time and not the next<br>
- Weight forward, left locked<br>
- Ball ahead in stance by an inch or two<br>
- Arms hang down loose, grip there<br>
- Tight in armpits, not biceps to side<br>
- Armpits start the swing, not the hands<br>
- Handle to feel like it goes up left arm<br>
- Short putt back in stance a couple inches for longer backswing<br>
<br>
- Line up putt as you would normally<br>
- Stand over putt and get your head to a point where the ball visually lines up with the line<br>
- Set the putter on that line and keep your head in the spot where it visually stays on that line<br>
- Set your feet and align ball in stnace accordingly<br>
- Drill at about 12 minutes<br>
<br>
<a href="https://youtu.be/FqjookBulo4?si=23R91kOEwibopK-6" target="_blank">Putting Lesson</a><br>
<br>
- Relax the arms<br>
- Aim a little right<br>
- Shoulder turn is the key - practice every day with stick across shoulders<br>
- Don't have to snap wrists too much<br>
- Set 6 tees in tunnel the club head travels<br>
- Practice in slow motion to feel everything so when fast you know what happened<br>
          </div>
        </div>
    </div>   


    `; 
setPageText("");
}
